<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume — Piyush Prajapati</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;600&display=swap"
    rel="stylesheet">

  <!-- CSS & JS -->
  <link rel="stylesheet" href="styles.css">
  <script src="api.js" defer></script>
  <script src="app.js" defer></script>

  <!-- Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

  <!-- Navbar -->
  <nav id="navbar" class="navbar">
    <div class="container navbar-inner">
      <a href="home.html" class="nav-logo" aria-label="Home"><img src="images/navbar_logo.png" alt="Dev.Data Logo" style="height: 32px; width: auto; display: block;"></a>

      <div id="nav-links" class="nav-links">
        <a href="home.html" class="nav-link">Home</a>
        <a href="about.html" class="nav-link">About</a>
        <a href="resume.html" class="nav-link active">Resume</a>
        <a href="projects.html" class="nav-link">Projects</a>
        <a href="contact.html" class="btn btn-primary" style="margin-left: var(--space-16)">Contact</a>
      </div>

      <button id="hamburger" class="hamburger" aria-label="Toggle Menu" aria-expanded="false">
        <i data-lucide="menu"></i>
      </button>
    </div>
  </nav>

  <main>
    <section class="section" style="padding-top: calc(var(--space-96) + 80px);">
      <div class="container flex-col reveal-up">
        <h1 class="display mb-32">Resume</h1>

        <!-- Video Resume Container -->
        <div id="resume-video-container" class="mb-48" style="width: 100%; max-width: 600px; margin: 0 auto 48px auto;">
          <!-- Populated dynamically via app.js -->
        </div>

        <!-- Actions Strip -->
        <div class="flex gap-16 mb-48" style="flex-wrap: wrap; justify-content: center;">
          <a href="#" id="download-resume-btn" class="btn btn-primary"><i data-lucide="download" width="16"></i> Download PDF</a>
          <button class="btn btn-secondary"
            onclick="navigator.clipboard.writeText('piyushprajapati292003@gmail.com'); alert('Email copied!');"><i data-lucide="copy"
              width="16"></i> Copy Email</button>
        </div>

        <!-- Inline PDF Preview Container -->
        <div id="resume-pdf-container" style="width: 100%; max-width: 850px; margin: 0 auto;">
          <!-- Populated dynamically via app.js -->
        </div>

      </div>
    </section>

    <!-- Certificates Section -->
    <section class="section" style="background-color: var(--color-inset); border-top: 1px solid var(--color-border);">
      <div class="container reveal-up">
        <div class="flex justify-between items-center mb-32">
          <h2>Certifications</h2>
          <span id="cert-count" class="badge" style="display:none;"></span>
        </div>
        <div id="certificates-grid" class="grid-3">
          <!-- Loading state -->
          <div style="grid-column:1/-1; text-align:center; padding: var(--space-32) 0; color: var(--color-text-muted);">
            <span style="opacity:0.6;">Loading certificates…</span>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer style="padding: var(--space-48) 0; text-align: center; border-top: 1px solid var(--color-border);">
    <div class="container flex-col items-center gap-16">
      <div class="nav-logo"><img src="images/navbar_logo.png" alt="Dev.Data Logo" style="height: 32px; width: auto; display: block;"></div>
      <div class="flex gap-16">
        <a href="https://github.com/piyush29-pr" target="_blank" aria-label="GitHub" class="link-amber"><i
            data-lucide="github"></i></a>
        <a href="https://www.linkedin.com/in/piyush1234567" target="_blank" aria-label="LinkedIn" class="link-amber"><i
            data-lucide="linkedin"></i></a>
        <a href="https://mail.google.com/mail/?view=cm&fs=1&to=piyushprajapati292003@gmail.com" target="_blank" rel="noopener" aria-label="Email" class="link-amber"><i data-lucide="mail"></i></a>
      </div>
      <p class="body-small">© 2026 <a href="admin.html" style="color: inherit; text-decoration: none; cursor: default;">Piyush Prajapati</a>. All rights reserved.</p>
    </div>
  </footer>

  <script>
    lucide.createIcons();
    
    // Handle Resume Download
    const downloadBtn = document.getElementById('download-resume-btn');
    if (downloadBtn) {
      downloadBtn.addEventListener('click', async (e) => {
        e.preventDefault();
        
        // Change button state
        const originalContent = downloadBtn.innerHTML;
        downloadBtn.innerHTML = '<i data-lucide="loader" class="spinner"></i> Preparing...';
        lucide.createIcons();
        downloadBtn.style.pointerEvents = 'none';

        try {
          // Log download and get URL
          const data = await window.api.downloadResume({
             // could pass metadata here if we wanted
          });

          // Redirect to the actual resume URL provided by the backend
          if (data && data.url) {
            window.open(data.url, '_blank');
          } else {
             // Fallback
             alert('Resume link is currently unavailable.');
          }
        } catch (error) {
          console.error(error);
          alert('Failed to download resume. Please try again.');
        } finally {
          // Restore button state
          downloadBtn.innerHTML = originalContent;
          lucide.createIcons();
          downloadBtn.style.pointerEvents = 'auto';
        }
      });
    }
  </script>
</body>

</html>
